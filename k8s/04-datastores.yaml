apiVersion: apps/v1
kind: Deployment
metadata:
  name: sqlserver
  namespace: academic-registration
  labels:
    app.kubernetes.io/name: academic-registration
    app.kubernetes.io/component: sqlserver
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: academic-registration
      app.kubernetes.io/component: sqlserver
  template:
    metadata:
      labels:
        app.kubernetes.io/name: academic-registration
        app.kubernetes.io/component: sqlserver
    spec:
      securityContext:
        fsGroup: 10001
      containers:
        - name: sqlserver
          image: mcr.microsoft.com/mssql/server:2022-latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: sqlserver
              containerPort: 1433
          env:
            - name: ACCEPT_EULA
              value: "Y"
            - name: MSSQL_PID
              value: Express
            - name: MSSQL_SA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: academic-registration-secrets
                  key: sqlserver-sa-password
          volumeMounts:
            - name: sqlserver-data
              mountPath: /var/opt/mssql
          startupProbe:
            tcpSocket:
              port: 1433
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            tcpSocket:
              port: 1433
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 1433
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 2Gi
      volumes:
        - name: sqlserver-data
          persistentVolumeClaim:
            claimName: sqlserver-data
---
apiVersion: v1
kind: Service
metadata:
  name: sqlserver
  namespace: academic-registration
  labels:
    app.kubernetes.io/name: academic-registration
    app.kubernetes.io/component: sqlserver
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: academic-registration
    app.kubernetes.io/component: sqlserver
  ports:
    - name: sqlserver
      protocol: TCP
      port: 1433
      targetPort: sqlserver
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: academic-registration
  labels:
    app.kubernetes.io/name: academic-registration
    app.kubernetes.io/component: kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: academic-registration
      app.kubernetes.io/component: kafka
  template:
    metadata:
      labels:
        app.kubernetes.io/name: academic-registration
        app.kubernetes.io/component: kafka
    spec:
      containers:
        - name: kafka
          image: apache/kafka:3.9.2
          imagePullPolicy: IfNotPresent
          ports:
            - name: broker
              containerPort: 29092
            - name: controller
              containerPort: 9093
          env:
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: broker,controller
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: 1@localhost:9093
            - name: KAFKA_LISTENERS
              value: PLAINTEXT://:29092,CONTROLLER://:9093
            - name: KAFKA_ADVERTISED_LISTENERS
              value: PLAINTEXT://kafka:29092
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: CONTROLLER
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: PLAINTEXT
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS
              value: "0"
          volumeMounts:
            - name: kafka-data
              mountPath: /tmp/kraft-combined-logs
          startupProbe:
            tcpSocket:
              port: 29092
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            exec:
              command:
                - /opt/kafka/bin/kafka-topics.sh
                - --bootstrap-server
                - localhost:29092
                - --list
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 29092
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: kafka-data
          persistentVolumeClaim:
            claimName: kafka-data
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: academic-registration
  labels:
    app.kubernetes.io/name: academic-registration
    app.kubernetes.io/component: kafka
spec:
  type: ClusterIP
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: academic-registration
    app.kubernetes.io/component: kafka
  ports:
    - name: broker
      protocol: TCP
      port: 29092
      targetPort: broker
    - name: controller
      protocol: TCP
      port: 9093
      targetPort: controller
