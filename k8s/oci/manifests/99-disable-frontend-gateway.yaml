apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: academic-registration
  labels:
    app.kubernetes.io/name: academic-registration
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: object-storage-frontend-migration
  annotations:
    academic-registration.local/disabled-reason: Frontend is served from OCI Object Storage.
spec:
  replicas: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: academic-registration
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: academic-registration
        app.kubernetes.io/component: frontend
        app.kubernetes.io/part-of: object-storage-frontend-migration
    spec:
      containers:
        - name: frontend
          image: docker.io/busybox:1.37
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - sleep infinity
          resources:
            requests:
              cpu: 1m
              memory: 16Mi
            limits:
              cpu: 25m
              memory: 32Mi
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: academic-registration
  labels:
    app.kubernetes.io/name: academic-registration
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: object-storage-frontend-migration
  annotations:
    academic-registration.local/disabled-reason: Service intentionally has no endpoints; frontend is served from OCI Object Storage.
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: academic-registration
    app.kubernetes.io/component: frontend-disabled
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: academic-registration
  labels:
    app.kubernetes.io/name: academic-registration
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: direct-api-ingress-migration
  annotations:
    academic-registration.local/disabled-reason: API is exposed directly through Ingress for the PoC.
spec:
  replicas: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: academic-registration
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: academic-registration
        app.kubernetes.io/component: gateway
        app.kubernetes.io/part-of: direct-api-ingress-migration
    spec:
      containers:
        - name: gateway
          image: docker.io/busybox:1.37
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - sleep infinity
          resources:
            requests:
              cpu: 1m
              memory: 16Mi
            limits:
              cpu: 25m
              memory: 32Mi
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: academic-registration
  labels:
    app.kubernetes.io/name: academic-registration
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: direct-api-ingress-migration
  annotations:
    academic-registration.local/disabled-reason: Service intentionally has no endpoints; clients must use the API service directly.
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: academic-registration
    app.kubernetes.io/component: gateway-disabled
  ports:
    - name: http
      protocol: TCP
      port: 5080
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: academic-registration-routes
  namespace: academic-registration
  labels:
    app.kubernetes.io/name: academic-registration
    app.kubernetes.io/part-of: simplified-poc
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: 10m
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.157.137.225.220.sslip.io
      secretName: academic-registration-tls
  rules:
    - host: api.157.137.225.220.sslip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 5081
