apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: academic-registration-routes
  namespace: academic-registration
  labels:
    app.kubernetes.io/name: academic-registration
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: 10m
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - academic.157.137.225.220.sslip.io
        - gateway.157.137.225.220.sslip.io
        - api.157.137.225.220.sslip.io
      secretName: academic-registration-tls
  rules:
    - host: academic.157.137.225.220.sslip.io
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 5080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
    - host: gateway.157.137.225.220.sslip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 5080
    - host: api.157.137.225.220.sslip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 5081
