apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: academic-registration
  labels:
    app.kubernetes.io/name: academic-registration
    app.kubernetes.io/component: kafka
    app.kubernetes.io/part-of: oci-managed-kafka-migration
  annotations:
    academic-registration.local/disabled-reason: Uses OCI Managed Kafka instead of the in-cluster Kafka container.
spec:
  replicas: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: academic-registration
      app.kubernetes.io/component: kafka
  template:
    metadata:
      labels:
        app.kubernetes.io/name: academic-registration
        app.kubernetes.io/component: kafka
        app.kubernetes.io/part-of: oci-managed-kafka-migration
    spec:
      containers:
        - name: kafka
          image: docker.io/busybox:1.37
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - sleep infinity
          resources:
            requests:
              cpu: 1m
              memory: 16Mi
            limits:
              cpu: 25m
              memory: 32Mi
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: academic-registration
  labels:
    app.kubernetes.io/name: academic-registration
    app.kubernetes.io/component: kafka
    app.kubernetes.io/part-of: oci-managed-kafka-migration
  annotations:
    academic-registration.local/disabled-reason: Service intentionally has no endpoints; clients must use OCI Managed Kafka.
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: academic-registration
    app.kubernetes.io/component: kafka-disabled
  ports:
    - name: broker
      protocol: TCP
      port: 29092
      targetPort: broker
    - name: controller
      protocol: TCP
      port: 9093
      targetPort: controller
