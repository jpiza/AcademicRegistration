apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: academic-registration
  labels:
    app.kubernetes.io/name: academic-registration
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: academic-registration
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: academic-registration
        app.kubernetes.io/component: api
    spec:
      imagePullSecrets:
        - name: ocir-secret
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.37
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - until nc -z mysql 3306; do echo "waiting for mysql"; sleep 5; done
        - name: wait-for-kafka
          image: busybox:1.37
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - until nc -z kafka 29092; do echo "waiting for kafka"; sleep 5; done
      containers:
        - name: api
          image: ocir.sa-bogota-1.oci.oraclecloud.com/ax8nej0w8huf/academic-registration/api:dev
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 5081
          envFrom:
            - configMapRef:
                name: academic-registration-config
          env:
            - name: ASPNETCORE_URLS
              value: http://+:5081
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: academic-registration-secrets
                  key: mysql-root-password
            - name: Configuracion__CadenasConexion__ConexionMySQL
              value: server=mysql;port=3306;database=AcademicRegistrationDb;user=root;password=$(MYSQL_ROOT_PASSWORD)
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: academic-registration
  labels:
    app.kubernetes.io/name: academic-registration
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: academic-registration
    app.kubernetes.io/component: api
  ports:
    - name: http
      protocol: TCP
      port: 5081
      targetPort: http
