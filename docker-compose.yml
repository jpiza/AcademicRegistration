name: academic-registration

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: academic-registration-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: Express
      MSSQL_SA_PASSWORD: ${SQLSERVER_SA_PASSWORD:-AcademicReg!2026}
    ports:
      - "${SQLSERVER_PORT:-1433}:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q \"SELECT 1\" || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -Q \"SELECT 1\""
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - academic-registration-network
    restart: unless-stopped

  localstack:
    image: localstack/localstack:latest
    container_name: academic-registration-localstack
    environment:
      SERVICES: events,sqs
      AWS_DEFAULT_REGION: us-east-1
      DEBUG: ${LOCALSTACK_DEBUG:-0}
    ports:
      - "${LOCALSTACK_PORT:-4566}:4566"
    volumes:
      - ./localstack/init/ready.d:/etc/localstack/init/ready.d
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - academic-registration-network
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.api
    container_name: academic-registration-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5081
      Configuracion__Conexion: SQL
      Configuracion__CadenasConexion__ConexionSQL: Server=sqlserver,1433;Database=AcademicRegistrationDb;User Id=sa;Password=${SQLSERVER_SA_PASSWORD:-AcademicReg!2026};TrustServerCertificate=True;MultipleActiveResultSets=true
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: us-east-1
      EventBridge__EventBusName: academic-registration
      EventBridge__Source: academic-registration.api
      EventBridge__Region: us-east-1
      EventBridge__ServiceUrl: http://localstack:4566
      Outbox__BatchSize: 20
      Outbox__PollingIntervalSeconds: 5
      Outbox__MaxRetries: 0
      Tracing__XRay__Enabled: "false"
      Cors__AllowedOrigins__0: http://localhost:${FRONTEND_PORT:-4200}
      Cors__AllowedOrigins__1: http://localhost:${GATEWAY_PORT:-5080}
    ports:
      - "${API_PORT:-5081}:5081"
    depends_on:
      sqlserver:
        condition: service_healthy
      localstack:
        condition: service_healthy
    networks:
      - academic-registration-network
    restart: unless-stopped

  notifications-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.notifications
    container_name: academic-registration-notifications-worker
    environment:
      DOTNET_ENVIRONMENT: Development
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: us-east-1
      Sqs__QueueUrl: http://localstack:4566/000000000000/academic-registration-notifications
      Sqs__Region: us-east-1
      Sqs__ServiceUrl: http://localstack:4566
      Sqs__MaxNumberOfMessages: 10
      Sqs__WaitTimeSeconds: 20
      Sqs__VisibilityTimeoutSeconds: 30
      Sqs__EmptyQueueDelaySeconds: 2
      Email__Enabled: ${EMAIL_ENABLED:-false}
      Email__From: ${EMAIL_FROM:-no-reply@academic-registration.local}
      Email__FromName: ${EMAIL_FROM_NAME:-Academic Registration}
      Email__Host: ${EMAIL_HOST:-}
      Email__Port: ${EMAIL_PORT:-587}
      Email__UserName: ${EMAIL_USERNAME:-}
      Email__Password: ${EMAIL_PASSWORD:-}
      Email__EnableSsl: ${EMAIL_ENABLE_SSL:-true}
      Email__RequireAuthentication: ${EMAIL_REQUIRE_AUTHENTICATION:-true}
      Tracing__XRay__Enabled: "false"
    depends_on:
      localstack:
        condition: service_healthy
    networks:
      - academic-registration-network
    restart: unless-stopped

  gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile.gateway
    container_name: academic-registration-gateway
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5080
      Cors__AllowedOrigins__0: http://localhost:${FRONTEND_PORT:-4200}
      ReverseProxy__Clusters__academic-registration-api__Destinations__api__Address: http://api:5081/
    ports:
      - "${GATEWAY_PORT:-5080}:5080"
    depends_on:
      - api
    networks:
      - academic-registration-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: academic-registration-frontend
    ports:
      - "${FRONTEND_PORT:-4200}:80"
    depends_on:
      - gateway
    networks:
      - academic-registration-network
    restart: unless-stopped

networks:
  academic-registration-network:
    driver: bridge

volumes:
  sqlserver-data:
