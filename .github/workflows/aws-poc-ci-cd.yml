name: AWS PoC CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy to AWS PoC"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      image_tag:
        description: "Container image tag. Defaults to the commit SHA."
        required: false
        type: string

permissions:
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  PROJECT_NAME: ${{ vars.PROJECT_NAME || 'academic-registration' }}
  ENVIRONMENT: ${{ vars.ENVIRONMENT || 'poc' }}
  TF_WORKING_DIR: infrastructure/aws-poc/terraform

concurrency:
  group: aws-poc-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Build and validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore backend
        run: dotnet restore backend/AcademicRegistration.slnx

      - name: Build backend
        run: dotnet build backend/AcademicRegistration.slnx --configuration Release --no-restore

      - name: Test backend
        run: dotnet test backend/AcademicRegistration.slnx --configuration Release --no-build

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check -recursive

      - name: Terraform init without backend
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

  deploy:
    name: Deploy AWS PoC
    runs-on: ubuntu-latest
    needs: validate
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && inputs.deploy == 'true')
    env:
      TF_VAR_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
      TF_VAR_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_VAR_smtp_password: ${{ secrets.SMTP_PASSWORD || 'replace-me' }}
      TF_VAR_email_enabled: ${{ vars.EMAIL_ENABLED || 'false' }}
      TF_VAR_smtp_host: ${{ vars.SMTP_HOST || '' }}
      TF_VAR_smtp_username: ${{ vars.SMTP_USERNAME || '' }}
      TF_VAR_smtp_from: ${{ vars.SMTP_FROM || 'no-reply@academic-registration.local' }}
      TF_VAR_db_engine: ${{ vars.DB_ENGINE || 'mysql' }}
      TF_VAR_db_instance_class: ${{ vars.DB_INSTANCE_CLASS || 'db.t3.micro' }}
      TF_VAR_db_storage_type: ${{ vars.DB_STORAGE_TYPE || 'gp2' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Configure Terraform backend
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          cat > backend.tf <<EOF
          terraform {
            backend "s3" {
              bucket         = "${{ secrets.TF_STATE_BUCKET }}"
              key            = "${PROJECT_NAME}/${ENVIRONMENT}/terraform.tfstate"
              region         = "${AWS_REGION}"
              dynamodb_table = "${{ secrets.TF_STATE_LOCK_TABLE }}"
              encrypt        = true
            }
          }
          EOF

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Bootstrap ECR repositories
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform apply -auto-approve \
            -target=aws_ecr_repository.api \
            -target=aws_ecr_repository.gateway \
            -target=aws_ecr_repository.notifications

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve image tag and repositories
        id: images
        run: |
          IMAGE_TAG="${{ inputs.image_tag }}"
          if [ -z "$IMAGE_TAG" ]; then
            IMAGE_TAG="${GITHUB_SHA}"
          fi

          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          REGISTRY="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          REPO_PREFIX="${PROJECT_NAME}-${ENVIRONMENT}"

          {
            echo "tag=${IMAGE_TAG}"
            echo "api=${REGISTRY}/${REPO_PREFIX}/api:${IMAGE_TAG}"
            echo "gateway=${REGISTRY}/${REPO_PREFIX}/gateway:${IMAGE_TAG}"
            echo "notifications=${REGISTRY}/${REPO_PREFIX}/notifications:${IMAGE_TAG}"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push API image
        run: |
          docker build -f backend/Dockerfile.api -t "${{ steps.images.outputs.api }}" backend
          docker push "${{ steps.images.outputs.api }}"

      - name: Build and push gateway image
        run: |
          docker build -f backend/Dockerfile.gateway -t "${{ steps.images.outputs.gateway }}" backend
          docker push "${{ steps.images.outputs.gateway }}"

      - name: Build and push notifications image
        run: |
          docker build -f backend/Dockerfile.notifications -t "${{ steps.images.outputs.notifications }}" backend
          docker push "${{ steps.images.outputs.notifications }}"

      - name: Terraform apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_image_tag: ${{ steps.images.outputs.tag }}
        run: terraform apply -auto-approve

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend artifact
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Publish frontend to S3
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          FRONTEND_BUCKET="$(terraform output -raw frontend_bucket)"
          DISTRIBUTION_ID="$(terraform output -raw cloudfront_distribution_id)"

          FRONTEND_DIST="../../../frontend/dist/academic-registration-web/browser"
          if [ ! -d "$FRONTEND_DIST" ]; then
            FRONTEND_DIST="../../../frontend/dist/academic-registration-web"
          fi

          printf '{"apiBaseUrl":"/api"}\n' > "$FRONTEND_DIST/app-config.json"
          aws s3 sync "$FRONTEND_DIST" "s3://${FRONTEND_BUCKET}" --delete
          aws cloudfront create-invalidation \
            --distribution-id "$DISTRIBUTION_ID" \
            --paths "/*"

      - name: Deployment summary
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "Frontend: $(terraform output -raw frontend_url)"
          echo "API: $(terraform output -raw api_base_url)"
